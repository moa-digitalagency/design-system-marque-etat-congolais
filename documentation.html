    <div class="mb-5">

      <a href="design-system.html" class="flex items-center gap-2 text-xs font-medium text-gray-500 hover:text-gray-800 transition">

  <!-- Main content -->
  <main class="flex-1 px-8 md:px-14 py-12 max-w-3xl">

    <!-- Hero -->
    <div class="mb-14">
      <span class="badge badge-info text-xs mb-3 inline-block">v1.0 · 2026</span>
      <h1 class="text-4xl font-cooper font-bold text-gray-900 mb-3">Design System<br><span style="color: var(--primary)">Marque État Congolais</span></h1>
      <p class="text-lg text-gray-500 mb-5">Guide de référence complet pour concevoir et développer des interfaces cohérentes pour le portail gouvernemental de la République Démocratique du Congo.</p>
      <div class="flex gap-3 flex-wrap">
        <a href="design-system.html" class="btn-primary px-5 py-2.5 text-sm flex items-center gap-2">
          <i data-lucide="layout-grid" class="w-4 h-4" aria-hidden="true"></i>
          Voir les composants
        </a>
        <a href="landing.html" class="border border-gray-200 bg-white hover:bg-gray-50 rounded-xl px-5 py-2.5 text-sm font-medium text-gray-700 transition flex items-center gap-2">
          <i data-lucide="globe" class="w-4 h-4" aria-hidden="true"></i>
          Portail public
        </a>
      </div>
    </div>

    <!-- Section: Principes -->
    <section id="principes" class="mb-16">
      <h2 class="text-2xl font-cooper font-bold text-gray-900 mb-2">Principes de design</h2>
      <p class="text-gray-500 mb-6">Les valeurs fondamentales qui guident toutes les décisions visuelles du système.</p>
      <div class="grid md:grid-cols-3 gap-4">
        <div class="p-5 bg-blue-50 rounded-2xl border border-blue-100">
          <i data-lucide="layers" class="w-6 h-6 text-blue-600 mb-3" aria-hidden="true"></i>
          <h3 class="font-semibold text-gray-900 mb-2">Cohérence</h3>
          <p class="text-sm text-gray-600">Chaque interface partage les mêmes tokens, composants et comportements. Seule la couleur primaire change selon le rôle.</p>
        </div>
        <div class="p-5 bg-green-50 rounded-2xl border border-green-100">
          <i data-lucide="smartphone" class="w-6 h-6 text-green-600 mb-3" aria-hidden="true"></i>
          <h3 class="font-semibold text-gray-900 mb-2">Mobile-first</h3>
          <p class="text-sm text-gray-600">Construire d'abord pour 375px, puis adapter progressivement vers 1280px via les breakpoints Tailwind (sm/md/lg/xl).</p>
        </div>
        <div class="p-5 bg-purple-50 rounded-2xl border border-purple-100">
          <i data-lucide="shield-check" class="w-6 h-6 text-purple-600 mb-3" aria-hidden="true"></i>
          <h3 class="font-semibold text-gray-900 mb-2">Accessibilité</h3>
          <p class="text-sm text-gray-600">Contrastes WCAG AA minimum, aria-labels sur tous les éléments interactifs, navigation clavier complète.</p>
        </div>
      </div>
      <div class="mt-4 grid md:grid-cols-2 gap-4">
        <div class="p-5 bg-yellow-50 rounded-2xl border border-yellow-100">
          <i data-lucide="zap" class="w-6 h-6 text-yellow-600 mb-3" aria-hidden="true"></i>
          <h3 class="font-semibold text-gray-900 mb-2">Performance</h3>
          <p class="text-sm text-gray-600">Pas d'images lourdes, SVG et CSS-only autant que possible. Tailwind via CDN pour simplifier le déploiement.</p>
        </div>
        <div class="p-5 bg-red-50 rounded-2xl border border-red-100">
          <i data-lucide="palette" class="w-6 h-6 text-red-600 mb-3" aria-hidden="true"></i>
          <h3 class="font-semibold text-gray-900 mb-2">Identité RDC</h3>
          <p class="text-sm text-gray-600">Inspiré des couleurs du drapeau (bleu, rouge, jaune/or) dans un univers premium, épuré et institutionnel.</p>
        </div>
      </div>
    </section>

    <!-- Section: Tokens -->
    <section id="tokens" class="mb-16">
      <h2 class="text-2xl font-cooper font-bold text-gray-900 mb-2">Tokens CSS</h2>
      <p class="text-gray-500 mb-6">Variables CSS définies dans <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">_shared.css</code> et surchargées par les classes de thème sur <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">&lt;body&gt;</code>.</p>

      <div class="overflow-auto rounded-2xl border border-gray-100 mb-5">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Token</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">SuperAdmin</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Consulaire</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Citoyen</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50">
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--primary</td>
              <td class="px-4 py-3"><span class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-red-600 inline-block shrink-0"></span><span class="font-mono text-xs">#C0392B</span></span></td>
              <td class="px-4 py-3"><span class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-yellow-500 inline-block shrink-0"></span><span class="font-mono text-xs">#F0A500</span></span></td>
              <td class="px-4 py-3"><span class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-blue-900 inline-block shrink-0"></span><span class="font-mono text-xs">#0095C9</span></span></td>
            </tr>
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--primary-to</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-600">#8B0000</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-600">#C77D00</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-600">#17418A</td>
            </tr>
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--bg-app</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500" colspan="3">#F8FAFC (global, tous thèmes)</td>
            </tr>
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--surface-glass</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500" colspan="3">rgba(255,255,255,0.65)</td>
            </tr>
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--border-glass</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500" colspan="3">rgba(255,255,255,0.35)</td>
            </tr>
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--shadow-glass</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500" colspan="3">0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6)</td>
            </tr>
            <tr class="table-row">
              <td class="px-4 py-3 font-mono text-xs text-gray-700">--sidebar-width</td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500" colspan="3">280px (collapsed: 72px)</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="p-4 bg-blue-50 border border-blue-100 rounded-xl text-sm text-blue-800">
        <strong>Usage :</strong> Appliquer <code class="bg-blue-100 px-1 rounded font-mono text-xs">theme-superadmin</code>, <code class="bg-blue-100 px-1 rounded font-mono text-xs">theme-consulaire</code> ou <code class="bg-blue-100 px-1 rounded font-mono text-xs">theme-citoyen</code> sur <code class="bg-blue-100 px-1 rounded font-mono text-xs">&lt;body&gt;</code> — tous les tokens se mettent à jour automatiquement en cascade.
      </div>
    </section>

    <!-- Section: Boutons -->
    <section id="boutons" class="mb-16">
      <h2 class="text-2xl font-cooper font-bold text-gray-900 mb-2">Boutons</h2>
      <p class="text-gray-500 mb-6">Classe <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">btn-primary</code> définie dans <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">_shared.css</code>. Les autres variantes utilisent les utilitaires Tailwind.</p>

      <div class="grid md:grid-cols-2 gap-4 mb-5">
        <div class="p-5 bg-green-50 border border-green-200 rounded-2xl">
          <p class="text-xs font-bold text-green-700 uppercase mb-3 flex items-center gap-1.5">
            <i data-lucide="check-circle" class="w-3.5 h-3.5" aria-hidden="true"></i> À faire
          </p>
          <ul class="text-sm text-green-800 space-y-1.5">
            <li>✓ Utiliser <code class="bg-green-100 px-1 rounded font-mono text-xs">btn-primary</code> pour l'action principale</li>
            <li>✓ Une seule action primaire par section visible</li>
            <li>✓ <code class="bg-green-100 px-1 rounded font-mono text-xs">aria-label</code> sur tous les boutons icône-only</li>
            <li>✓ Ajouter <code class="bg-green-100 px-1 rounded font-mono text-xs">opacity-40 cursor-not-allowed</code> sur disabled</li>
          </ul>
        </div>
        <div class="p-5 bg-red-50 border border-red-200 rounded-2xl">
          <p class="text-xs font-bold text-red-700 uppercase mb-3 flex items-center gap-1.5">
            <i data-lucide="x-circle" class="w-3.5 h-3.5" aria-hidden="true"></i> À éviter
          </p>
          <ul class="text-sm text-red-800 space-y-1.5">
            <li>✗ Couleurs hardcodées — toujours utiliser les tokens CSS</li>
            <li>✗ Plusieurs boutons primaires côte à côte</li>
            <li>✗ Boutons icône-only sans texte accessible</li>
            <li>✗ Modifier <code class="bg-red-100 px-1 rounded font-mono text-xs">btn-primary</code> en inline style</li>
          </ul>
        </div>
      </div>

      <div class="bg-gray-900 rounded-2xl p-5">
        <p class="text-xs text-gray-400 mb-3 font-mono">Exemples d'usage</p>
        <pre class="text-sm text-green-400 overflow-x-auto leading-relaxed"><code>&lt;!-- Action principale --&gt;
&lt;button class="btn-primary px-5 py-2.5 text-sm"&gt;Valider&lt;/button&gt;

&lt;!-- Secondaire --&gt;
&lt;button class="border border-gray-200 bg-white hover:bg-gray-50
               rounded-xl px-5 py-2.5 text-sm font-medium
               text-gray-700 transition"&gt;Annuler&lt;/button&gt;

&lt;!-- Icône-only avec aria-label obligatoire --&gt;
&lt;button class="btn-primary w-10 h-10 flex items-center
               justify-center rounded-xl"
        aria-label="Ajouter un utilisateur"&gt;
  &lt;i data-lucide="plus" class="w-4 h-4" aria-hidden="true"&gt;&lt;/i&gt;
&lt;/button&gt;</code></pre>
      </div>
    </section>

    <!-- Section: Inputs -->
    <section id="inputs" class="mb-16">
      <h2 class="text-2xl font-cooper font-bold text-gray-900 mb-2">Champs de formulaire</h2>
      <p class="text-gray-500 mb-6">Classe <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">input-base</code> dans <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">_shared.css</code>. Modifiée avec <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">input-error</code> ou <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">input-success</code>.</p>

      <div class="grid md:grid-cols-2 gap-4 mb-5">
        <div class="p-5 bg-green-50 border border-green-200 rounded-2xl">
          <p class="text-xs font-bold text-green-700 uppercase mb-3">À faire</p>
          <ul class="text-sm text-green-800 space-y-1.5">
            <li>✓ Associer chaque input à un <code class="bg-green-100 px-1 rounded font-mono text-xs">&lt;label for="id"&gt;</code></li>
            <li>✓ Afficher le message d'erreur sous le champ</li>
            <li>✓ Utiliser <code class="bg-green-100 px-1 rounded font-mono text-xs">autocomplete</code> approprié</li>
            <li>✓ Marquer les champs requis avec <code class="bg-green-100 px-1 rounded font-mono text-xs">aria-required="true"</code></li>
          </ul>
        </div>
        <div class="p-5 bg-red-50 border border-red-200 rounded-2xl">
          <p class="text-xs font-bold text-red-700 uppercase mb-3">À éviter</p>
          <ul class="text-sm text-red-800 space-y-1.5">
            <li>✗ Inputs sans label associé</li>
            <li>✗ Styliser les inputs sans <code class="bg-red-100 px-1 rounded font-mono text-xs">input-base</code></li>
            <li>✗ Couleurs de focus hardcodées (ex: <code class="bg-red-100 px-1 rounded font-mono text-xs">focus:border-blue-400</code>)</li>
            <li>✗ Placeholder comme substitut au label</li>
          </ul>
        </div>
      </div>

      <div class="bg-gray-900 rounded-2xl p-5">
        <pre class="text-sm text-green-400 overflow-x-auto leading-relaxed"><code>&lt;!-- Input standard --&gt;
&lt;div class="mb-4"&gt;
  &lt;label for="email" class="block text-sm font-medium text-gray-700 mb-1.5"&gt;
    Adresse e-mail
  &lt;/label&gt;
  &lt;input type="email" id="email" class="input-base"
         placeholder="nom@exemple.cd" autocomplete="email"
         aria-required="true"&gt;
&lt;/div&gt;

&lt;!-- État erreur --&gt;
&lt;input type="email" class="input-base input-error" aria-invalid="true"
       aria-describedby="email-error"&gt;
&lt;p id="email-error" class="text-xs text-red-500 mt-1"&gt;Email invalide&lt;/p&gt;</code></pre>
      </div>
    </section>

    <!-- Section: Cards -->
    <section id="cards" class="mb-16">
      <h2 class="text-2xl font-cooper font-bold text-gray-900 mb-2">Cards</h2>
      <p class="text-gray-500 mb-6">Quatre variantes. <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">.glass-card</code> et <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">.stat-card</code> sont dans <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">_shared.css</code>.</p>

      <div class="overflow-auto rounded-2xl border border-gray-100 mb-5">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Variante</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Classe / Structure</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Usage</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50 text-sm">
            <tr class="table-row"><td class="px-4 py-3 font-medium">Simple</td><td class="px-4 py-3 font-mono text-xs text-gray-600">bg-white border border-gray-100 rounded-2xl p-6 shadow-sm</td><td class="px-4 py-3 text-gray-600">Contenu général, formulaires</td></tr>
            <tr class="table-row"><td class="px-4 py-3 font-medium">Stat</td><td class="px-4 py-3 font-mono text-xs text-gray-600">.stat-card p-5</td><td class="px-4 py-3 text-gray-600">KPIs, métriques chiffrées</td></tr>
            <tr class="table-row"><td class="px-4 py-3 font-medium">Action</td><td class="px-4 py-3 font-mono text-xs text-gray-600">Simple + bouton interne</td><td class="px-4 py-3 text-gray-600">Liens rapides, CTA contextuels</td></tr>
            <tr class="table-row"><td class="px-4 py-3 font-medium">Glass</td><td class="px-4 py-3 font-mono text-xs text-gray-600">.glass-card rounded-2xl p-6</td><td class="px-4 py-3 text-gray-600">Login, hero, sur fond coloré uniquement</td></tr>
          </tbody>
        </table>
      </div>

      <div class="p-4 bg-yellow-50 border border-yellow-200 rounded-xl text-sm text-yellow-800 mb-4">
        <strong>⚠️ Important :</strong> <code class="bg-yellow-100 px-1 rounded font-mono text-xs">.glass-card</code> nécessite un fond non-blanc pour que l'effet <code class="bg-yellow-100 px-1 rounded font-mono text-xs">backdrop-filter: blur</code> soit visible. Sur fond blanc, l'effet est imperceptible.
      </div>
    </section>

    <!-- Section: Badges -->
    <section id="badges" class="mb-16">
      <h2 class="text-2xl font-cooper font-bold text-gray-900 mb-2">Badges & Tags</h2>
      <p class="text-gray-500 mb-6">Toujours utiliser <code class="bg-gray-100 px-1.5 py-0.5 rounded text-sm font-mono">badge badge-[variante]</code>. Ne jamais hardcoder les couleurs de statut.</p>

      <div class="overflow-auto rounded-2xl border border-gray-100 mb-5">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Classe</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Aperçu</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600 text-xs">Utilisation</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50">
            <tr class="table-row"><td class="px-4 py-3 font-mono text-xs">badge-pending</td><td class="px-4 py-3"><span class="badge badge-pending">En attente</span></td><td class="px-4 py-3 text-sm text-gray-600">En attente, à traiter, soumis</td></tr>
            <tr class="table-row"><td class="px-4 py-3 font-mono text-xs">badge-success</td><td class="px-4 py-3"><span class="badge badge-success">Validé</span></td><td class="px-4 py-3 text-sm text-gray-600">Validé, actif, disponible, succès</td></tr>
            <tr class="table-row"><td class="px-4 py-3 font-mono text-xs">badge-error</td><td class="px-4 py-3"><span class="badge badge-error">Rejeté</span></td><td class="px-4 py-3 text-sm text-gray-600">Rejeté, erreur, urgent, suspendu</td></tr>
            <tr class="table-row"><td class="px-4 py-3 font-mono text-xs">badge-info</td><td class="px-4 py-3"><span class="badge badge-info">En cours</span></td><td class="px-4 py-3 text-sm text-gray-600">En cours, en traitement, information</td></tr>

<script>
// Scroll-spy
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('.doc-nav-link').forEach(a => {
        const isActive = a.getAttribute('href') === '#' + entry.target.id;
        a.classList.toggle('active', isActive);
      });
    }
  });
}, { threshold: 0.2, rootMargin: '-60px 0px -60% 0px' });

document.querySelectorAll('section[id]').forEach(s => observer.observe(s));

// Smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelector(a.getAttribute('href'))?.scrollIntoView({ behavior: 'smooth' });
  });
});

lucide.createIcons();
</script>
