<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Portail Numérique RDC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./_tailwind-config.js"></script>
  <link rel="stylesheet" href="./_shared.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-inter theme-citoyen" id="loginBody"
      style="background: linear-gradient(135deg, #F8FAFC 0%, #E8F4FD 50%, #FFFDE6 100%);">

  <!-- Decorative background elements -->
  <div class="deco-circle w-96 h-96 -top-20 -right-20 opacity-20 pointer-events-none fixed"></div>
  <div class="deco-circle w-72 h-72 bottom-10 -left-16 opacity-15 pointer-events-none fixed"></div>

  <!-- Main card -->
  <div class="glass-card rounded-3xl p-8 w-full max-w-md relative z-10">

    <!-- Logo + title -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl btn-primary flex items-center justify-center mx-auto mb-4" id="loginIconWrap">
        <i data-lucide="user" class="w-8 h-8 text-white" id="loginIcon" aria-hidden="true"></i>
      </div>
      <h1 class="text-2xl font-cooper font-bold text-gray-900">Connexion</h1>
      <p class="text-gray-500 text-sm mt-1">Portail Numérique — République Démocratique du Congo</p>
    </div>

    <!-- Role selector tabs -->
    <div class="grid grid-cols-3 gap-2 mb-6 p-1 bg-gray-100 rounded-xl" role="tablist" aria-label="Sélectionner votre rôle">
      <button onclick="setRole('citoyen', 'user', 'theme-citoyen')"
              id="btn-citoyen" role="tab" aria-selected="true"
              class="role-btn py-2.5 text-xs font-semibold rounded-lg transition-all bg-white shadow text-gray-800">
        Citoyen
      </button>
      <button onclick="setRole('consulaire', 'briefcase', 'theme-consulaire')"
              id="btn-consulaire" role="tab" aria-selected="false"
              class="role-btn py-2.5 text-xs font-semibold rounded-lg transition-all text-gray-500 hover:text-gray-700">
        Consulaire
      </button>
      <button onclick="setRole('superadmin', 'shield', 'theme-superadmin')"
              id="btn-superadmin" role="tab" aria-selected="false"
              class="role-btn py-2.5 text-xs font-semibold rounded-lg transition-all text-gray-500 hover:text-gray-700">
        Admin
      </button>
    </div>

    <!-- Login form -->
    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Adresse e-mail</label>
        <div class="relative">
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <i data-lucide="mail" class="w-4 h-4" aria-hidden="true"></i>
          </div>
          <input type="email" id="email" name="email"
                 class="input-base pl-10" placeholder="nom@exemple.cd"
                 autocomplete="email" required
                 aria-required="true">
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe</label>
        <div class="relative">
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <i data-lucide="lock" class="w-4 h-4" aria-hidden="true"></i>
          </div>
          <input type="password" id="password" name="password"
                 class="input-base pl-10 pr-12" placeholder="••••••••"
                 autocomplete="current-password" required
                 aria-required="true">
          <button type="button" id="pwdToggle" onclick="togglePwd()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
                  aria-label="Afficher ou masquer le mot de passe">
            <i data-lucide="eye" class="w-4 h-4" id="eyeIcon" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Remember + forgot -->
      <div class="flex items-center justify-between mb-6 text-sm">
        <label class="flex items-center gap-2 text-gray-600 cursor-pointer select-none">
          <input type="checkbox" id="remember" name="remember" class="rounded">
          <span>Se souvenir de moi</span>
        </label>
        <a href="#" class="font-medium hover:underline" style="color: var(--primary)">Mot de passe oublié ?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary w-full py-3 text-base font-semibold flex items-center justify-center gap-2">
        <i data-lucide="log-in" class="w-5 h-5" aria-hidden="true"></i>
        Se connecter
      </button>
    </form>

    <!-- Back to landing -->
    <div class="mt-6 text-center">
      <a href="landing.html" class="text-sm text-gray-500 hover:text-gray-700 transition flex items-center justify-center gap-1">
        <i data-lucide="arrow-left" class="w-3 h-3" aria-hidden="true"></i>
        Retour au portail
      </a>
    </div>

  </div>

  <script>
  // Role switcher
  function setRole(role, iconName, theme) {
    // Update body class
    document.getElementById('loginBody').classList.remove('theme-citoyen', 'theme-consulaire', 'theme-superadmin');
    document.getElementById('loginBody').classList.add(theme);

    // Update icon
    const icon = document.getElementById('loginIcon');
    icon.setAttribute('data-lucide', iconName);
    lucide.createIcons();

    // Update tab buttons
    ['citoyen', 'consulaire', 'superadmin'].forEach(r => {
      const btn = document.getElementById('btn-' + r);
      const isActive = r === role;
      btn.setAttribute('aria-selected', isActive.toString());
      btn.className = isActive
        ? 'role-btn py-2.5 text-xs font-semibold rounded-lg transition-all bg-white shadow text-gray-800'
        : 'role-btn py-2.5 text-xs font-semibold rounded-lg transition-all text-gray-500 hover:text-gray-700';
    });
  }

  // Password toggle
  function togglePwd() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
    lucide.createIcons();
  }

  // Form submit (demo — redirect based on role)
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const body = document.getElementById('loginBody');
    if (body.classList.contains('theme-superadmin')) {
      window.location.href = 'superadmin/dashboard.html';
    } else if (body.classList.contains('theme-consulaire')) {
      window.location.href = 'consulaire/dashboard.html';
    } else {
      window.location.href = 'citoyen/dashboard.html';
    }
  });

  lucide.createIcons();
  </script>
</body>
</html>
